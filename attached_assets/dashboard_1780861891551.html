<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SmartWorker</title>
    <link rel="icon" type="image/png" href="#">
    <link rel="apple-touch-icon" href="#">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#001F3F",
                        accent: "#007BFF",
                        lightGray: "#D3D3D3"
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"]
                    }
                }
            }
        };
    </script>
    
    <!-- Font Awesome -->
    <script>window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;500;600;700;800;900&display=swap">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="#">
    
    <!-- Additional libraries for specific pages -->
    
    
    <style>
        body {
            font-family: 'Inter', sans-serif !important;
        }

        .app-bottom-nav {
            z-index: 50;
            padding: 0 0.75rem calc(0.7rem + env(safe-area-inset-bottom));
        }

        .app-bottom-nav-frame {
            position: relative;
            overflow: hidden;
            height: 5.1rem;
            border-radius: 1.75rem;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(246, 250, 255, 0.95) 100%);
            box-shadow: 0 -8px 18px rgba(15, 23, 42, 0.08), 0 12px 28px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(16px);
        }

        .app-nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            padding: 0.45rem 0.5rem 0.35rem;
        }

        .app-nav-item {
            width: 3.95rem;
            text-align: center;
            border-radius: 0.95rem;
            padding: 0.35rem 0.2rem;
            color: #94a3b8;
        }

        .app-nav-item:hover {
            color: #475569;
        }

        .app-nav-icon-wrap {
            width: 2rem;
            height: 2rem;
            margin: 0 auto 0.2rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-nav-item-active {
            color: #001f3f;
        }

        .app-nav-item-active .app-nav-icon-wrap {
            background: linear-gradient(180deg, rgba(0, 123, 255, 0.16) 0%, rgba(0, 123, 255, 0.08) 100%);
            box-shadow: inset 0 0 0 1px rgba(0, 123, 255, 0.12);
        }

        .app-nav-label {
            font-size: 0.62rem;
            line-height: 1;
            letter-spacing: 0.01em;
            font-weight: 600;
        }

        .app-nav-fab {
            width: 3.95rem;
            height: 4rem;
            border-radius: 1rem;
            background: linear-gradient(145deg, #001f3f 0%, #007bff 100%);
            border: 1px solid rgba(255, 255, 255, 0.9);
            color: #ffffff;
            box-shadow: 0 8px 16px rgba(0, 31, 63, 0.22);
        }

        .app-nav-fab i {
            filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.2));
        }

        .app-nav-fab::after {
            content: "";
            position: absolute;
            inset: 4px;
            border-radius: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.24);
            pointer-events: none;
        }

        .app-nav-fab:hover {
            transform: translateY(-1px);
        }

        .app-nav-fab-active {
            box-shadow: 0 10px 20px rgba(0, 31, 63, 0.28);
        }
        
        .fa, .fas, .far, .fal, .fab {
            font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
        }
        
        ::-webkit-scrollbar {
            display: none;
        }
        
        html, body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Flash Messages -->
    
        
    

    <div id="mobile-app" class="max-w-sm mx-auto bg-gray-50 min-h-screen pb-32">
        
<header class="bg-gradient-to-br from-primary via-blue-900 to-accent text-white p-4 rounded-b-3xl shadow-xl">
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center space-x-4">
            <img src="https://via.placeholder.com/80/001F3F/FFFFFF?text=SW" alt="SmartWorker" class="w-10 h-10 rounded-lg object-contain">
            <div>
                <div class="text-xl font-semibold">SmartWorker</div>
                <div class="text-sm opacity-90">Dashboard Overview</div>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <button class="w-10 h-10 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center">
                <i class="fa-solid fa-bell text-lg"></i>
            </button>
            <a href="#" class="w-10 h-10 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center">
                <i class="fa-solid fa-user text-lg"></i>
            </a>
        </div>
    </div>
    
    <div class="bg-white/15 backdrop-blur-lg rounded-2xl p-4 border border-white/20">
        <div class="text-center">
            <div class="text-2xl font-bold mb-1">Welcome back, Javed!</div>
            <div class="text-sm opacity-90" id="current-date"></div>
        </div>
    </div>
</header>

<main class="p-4 pb-32 space-y-6">
    <!-- Quick Stats -->
    <section class="grid grid-cols-2 gap-4">
        <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-4 rounded-2xl shadow-lg">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-2xl font-bold">7</div>
                    <div class="text-sm opacity-90">Total Workers</div>
                </div>
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-users text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-gradient-to-br from-green-500 to-green-600 text-white p-4 rounded-2xl shadow-lg">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-2xl font-bold">0</div>
                    <div class="text-sm opacity-90">Present Today</div>
                </div>
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-check-circle text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-4 rounded-2xl shadow-lg">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-2xl font-bold">0.0%</div>
                    <div class="text-sm opacity-90">Attendance Rate</div>
                </div>
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-chart-pie text-xl"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-4 rounded-2xl shadow-lg">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-2xl font-bold">7</div>
                    <div class="text-sm opacity-90">Absent Today</div>
                </div>
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-user-slash text-xl"></i>
                </div>
            </div>
        </div>
    </section>

    <!-- Payroll Shortcut -->
    <a href="#" class="block bg-gradient-to-br from-primary to-accent text-white p-4 rounded-2xl shadow-lg hover:shadow-xl transition-all">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-file-invoice-dollar text-xl"></i>
                </div>
                <div>
                    <div class="text-lg font-semibold">Payroll</div>
                    <div class="text-sm opacity-90">Calculate & track monthly wages</div>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right opacity-80"></i>
        </div>
    </a>

    <!-- Quick Actions -->
    <section class="bg-white rounded-3xl shadow-lg border border-gray-100 p-4">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">Quick Actions</h3>
        <div class="grid grid-cols-2 gap-3">
            <a href="#" class="flex items-center justify-center p-4 bg-accent text-white rounded-2xl hover:shadow-lg transition-all">
                <i class="fa-solid fa-user-plus mr-2"></i>
                Add Worker
            </a>
            <a href="#" class="flex items-center justify-center p-4 bg-green-500 text-white rounded-2xl hover:shadow-lg transition-all">
                <i class="fa-solid fa-calendar-check mr-2"></i>
                Mark Attendance
            </a>
            <a href="#" class="flex items-center justify-center p-4 bg-purple-500 text-white rounded-2xl hover:shadow-lg transition-all">
                <i class="fa-solid fa-users mr-2"></i>
                View Workers
            </a>
            <a href="#" class="flex items-center justify-center p-4 bg-orange-500 text-white rounded-2xl hover:shadow-lg transition-all">
                <i class="fa-solid fa-calendar-xmark mr-2"></i>
                Closures
            </a>
        </div>
    </section>

    <!-- Today's Attendance -->
    

    <!-- Upcoming Closures -->
    
</main>

<script>
// Set current date
document.addEventListener('DOMContentLoaded', function() {
    const dateElement = document.getElementById('current-date');
    if (dateElement) {
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateElement.textContent = today.toLocaleDateString('en-US', options);
    }
});
</script>

        
        
        
        
        
        
        
        <!-- Bottom Navigation -->
        <nav class="app-bottom-nav fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-sm">
            <div class="app-bottom-nav-frame">
                <div class="app-nav-row">
                    <a href="#" class="app-nav-item transition-colors app-nav-item-active">
                        <span class="app-nav-icon-wrap"><i class="fa-solid fa-home text-xl"></i></span>
                        <span class="app-nav-label">Home</span>
                    </a>

                    <a href="#" class="app-nav-item transition-colors ">
                        <span class="app-nav-icon-wrap"><i class="fa-solid fa-users text-xl"></i></span>
                        <span class="app-nav-label">Workers</span>
                    </a>

                    <a href="#" class="app-nav-item app-nav-fab flex flex-col items-center justify-center transition-all ">
                        <span class="app-nav-icon-wrap"><i class="fa-solid fa-qrcode text-xl"></i></span>
                        <span class="app-nav-label">Barcode</span>
                    </a>

                    <a href="#" class="app-nav-item transition-colors ">
                        <span class="app-nav-icon-wrap"><i class="fa-solid fa-receipt text-xl"></i></span>
                        <span class="app-nav-label">Transactions</span>
                    </a>

                    <a href="#" class="app-nav-item transition-colors ">
                        <span class="app-nav-icon-wrap"><i class="fa-solid fa-user text-xl"></i></span>
                        <span class="app-nav-label">Profile</span>
                    </a>
                </div>
            </div>
        </nav>
        
    </div>
    
    <!-- Custom JavaScript -->
    <script src="https://via.placeholder.com/80/001F3F/FFFFFF?text=SW"></script>
    
    <!-- Page-specific JavaScript -->
    
    
    <!-- Auto-hide flash messages -->
    <script>
        setTimeout(function() {
            const flashMessages = document.getElementById('flash-messages');
            if (flashMessages) {
                flashMessages.style.opacity = '0';
                setTimeout(() => flashMessages.remove(), 300);
            }
        }, 5000);
    </script>
</body>
</html>
