{% extends "base.html" %}

{% block title %}QR Scanner - SmartWorker{% endblock %}

{% block head %}
<script src="{{ url_for('static', filename='vendor/html5-qrcode.min.js') }}"></script>
<style>
#qr-reader { border-radius: 1.5rem; overflow: hidden; }
#qr-reader video { border-radius: 1.5rem; object-fit: cover; }
#qr-reader__dashboard_section_csr button { color: #007BFF; }
</style>
{% endblock %}

{% block content %}
<header class="bg-gradient-to-br from-primary via-blue-900 to-accent text-white p-4 rounded-b-3xl shadow-xl">
    <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <a href="{{ url_for('attendance') }}" class="w-10 h-10 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </a>
            <div>
                <div class="text-xl font-semibold">QR Scanner</div>
                <div class="text-sm opacity-90">Scan ID card or enter Employee ID</div>
            </div>
        </div>
        <button onclick="toggleScanner()" id="scanner-toggle" class="w-10 h-10 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center">
            <i class="fa-solid fa-camera-rotate text-lg"></i>
        </button>
    </div>
</header>

<main class="p-4 pb-32 space-y-4">
    <!-- Scanner -->
    <section class="bg-white rounded-3xl shadow-lg border border-gray-100 p-4">
        <div id="qr-reader" class="w-full"></div>
        <div id="scanner-status" class="text-center text-sm text-gray-500 mt-3">
            <i class="fa-solid fa-camera mr-1"></i>Starting camera…
        </div>
    </section>

    <!-- Manual Employee ID entry -->
    <section class="bg-white rounded-3xl shadow-lg border border-gray-100 p-4">
        <h3 class="text-sm font-semibold text-gray-800 mb-3"><i class="fa-solid fa-keyboard mr-2 text-accent"></i>Manual Employee ID Entry</h3>
        <form onsubmit="return lookupManual(event)" class="flex gap-2">
            <input type="text" id="manual-id" placeholder="e.g. CO001" autocomplete="off" autocapitalize="characters"
                   class="flex-1 p-3 border border-lightGray rounded-xl focus:ring-2 focus:ring-accent uppercase">
            <button type="submit" class="px-5 bg-accent text-white rounded-xl font-medium hover:bg-primary transition-colors">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>
    </section>

    <!-- Result card -->
    <section id="result-card" class="hidden bg-white rounded-3xl shadow-lg border border-gray-100 p-4">
        <div class="flex items-center space-x-4 mb-4">
            <div id="result-photo-wrap" class="w-14 h-14 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center text-white font-bold text-xl overflow-hidden shrink-0"></div>
            <div class="flex-1 min-w-0">
                <div class="font-semibold text-gray-800 truncate" id="result-name"></div>
                <div class="text-xs text-gray-500" id="result-meta"></div>
                <div class="text-xs text-gray-500" id="result-site"></div>
            </div>
        </div>
        <div id="result-attendance" class="text-xs text-gray-600 bg-gray-50 rounded-xl p-3 mb-4"></div>
        <div id="result-closure" class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-xl p-3 mb-4"></div>
        <div class="grid grid-cols-2 gap-3">
            <form method="POST" action="{{ url_for('mark_attendance') }}" id="checkin-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="worker_id" id="action-worker-id" value="">
                <input type="hidden" name="date" value="{{ today.isoformat() }}">
                <input type="hidden" name="status" id="action-status" value="present">
                <input type="hidden" name="marked_via" id="action-via" value="qr">
                <input type="hidden" name="redirect_to" value="{{ url_for('scan') }}">
                <button type="submit" id="checkin-btn"
                        class="w-full py-3 bg-green-500 text-white rounded-xl font-medium hover:bg-green-600 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-right-to-bracket mr-1"></i><span id="checkin-label">Check In</span>
                </button>
            </form>
            <a href="#" id="result-profile-link"
               class="w-full py-3 bg-accent/10 text-accent rounded-xl font-medium text-center hover:bg-accent/20 transition-colors">
                <i class="fa-solid fa-user mr-1"></i>Open Profile
            </a>
        </div>
    </section>
</main>

<script>
let html5Qrcode = null;
let scannerRunning = false;
let lastScan = { code: null, at: 0 };

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function setStatus(html) {
    document.getElementById('scanner-status').innerHTML = html;
}

async function startScanner() {
    if (typeof Html5Qrcode === 'undefined') {
        setStatus('<i class="fa-solid fa-wifi-slash mr-1 text-red-500"></i>Scanner library unavailable offline — use Manual ID entry below.');
        return;
    }
    try {
        html5Qrcode = new Html5Qrcode('qr-reader');
        await html5Qrcode.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 220, height: 220 } },
            onScanSuccess,
            () => {}
        );
        scannerRunning = true;
        setStatus('<i class="fa-solid fa-qrcode mr-1 text-green-500"></i>Point the camera at a worker QR code');
    } catch (err) {
        setStatus('<i class="fa-solid fa-triangle-exclamation mr-1 text-amber-500"></i>Camera unavailable (' + escapeHtml(err.toString()) + '). Use Manual ID entry below.');
    }
}

async function toggleScanner() {
    if (!html5Qrcode) { startScanner(); return; }
    if (scannerRunning) {
        await html5Qrcode.stop();
        scannerRunning = false;
        setStatus('<i class="fa-solid fa-pause mr-1"></i>Scanner paused — tap the camera button to resume.');
    } else {
        startScanner();
    }
}

function onScanSuccess(decodedText) {
    const now = Date.now();
    if (decodedText === lastScan.code && now - lastScan.at < 4000) return;
    lastScan = { code: decodedText, at: now };
    if (navigator.vibrate) navigator.vibrate(80);
    lookupWorker(decodedText, 'qr');
}

function lookupManual(e) {
    e.preventDefault();
    const code = document.getElementById('manual-id').value.trim();
    if (code) lookupWorker(code, 'worker_id');
    return false;
}

async function lookupWorker(code, via) {
    setStatus('<i class="fa-solid fa-spinner fa-spin mr-1"></i>Looking up ' + escapeHtml(code) + '…');
    try {
        const res = await fetch('/api/worker_lookup?code=' + encodeURIComponent(code), { credentials: 'same-origin' });
        const data = await res.json();
        if (!data.success) {
            setStatus('<i class="fa-solid fa-circle-xmark mr-1 text-red-500"></i>' + escapeHtml(data.message));
            document.getElementById('result-card').classList.add('hidden');
            return;
        }
        renderResult(data, via);
        setStatus('<i class="fa-solid fa-circle-check mr-1 text-green-500"></i>Worker found — scan time captured automatically on check-in.');
    } catch (err) {
        setStatus('<i class="fa-solid fa-wifi-slash mr-1 text-red-500"></i>Offline — attendance will sync when internet returns. Use the Attendance page for offline marking.');
    }
}

function renderResult(data, via) {
    const w = data.worker, a = data.attendance;
    const photoWrap = document.getElementById('result-photo-wrap');
    photoWrap.innerHTML = w.photo
        ? '<img src="' + w.photo + '" class="w-full h-full object-cover">'
        : w.name.charAt(0);
    document.getElementById('result-name').textContent = w.name;
    document.getElementById('result-meta').textContent = w.worker_id + ' • ' + w.position + ' • ' + w.department;
    document.getElementById('result-site').textContent =
        (w.site ? 'Site: ' + w.site : '') + (w.project ? (w.site ? ' • ' : '') + 'Project: ' + w.project : '');
    document.getElementById('result-profile-link').href = w.profile_url;
    document.getElementById('action-worker-id').value = w.id;
    document.getElementById('action-via').value = via;

    let attHtml = '';
    if (a.status) {
        attHtml = 'Today: <b class="capitalize">' + a.status + '</b>';
        if (a.check_in) attHtml += ' • In: <b>' + a.check_in + '</b>';
        if (a.check_out) attHtml += ' • Out: <b>' + a.check_out + '</b>';
    } else {
        attHtml = 'No attendance marked today yet.';
    }
    document.getElementById('result-attendance').innerHTML = attHtml;

    const closureBox = document.getElementById('result-closure');
    const btn = document.getElementById('checkin-btn');
    const label = document.getElementById('checkin-label');
    if (data.closure && data.closure.locked) {
        closureBox.textContent = 'Closure day: ' + data.closure.reason + ' — attendance locked.';
        closureBox.classList.remove('hidden');
        btn.disabled = true;
    } else {
        closureBox.classList.add('hidden');
        if (a.can_check_in) {
            btn.disabled = false; label.textContent = 'Check In';
            document.getElementById('action-status').value = 'present';
        } else if (a.can_check_out) {
            btn.disabled = false; label.textContent = 'Check Out';
            // Re-posting the current status closes the open shift
            document.getElementById('action-status').value = a.status;
        } else {
            btn.disabled = true; label.textContent = 'Shift Closed';
        }
    }
    document.getElementById('result-card').classList.remove('hidden');
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

document.addEventListener('DOMContentLoaded', () => {
    startScanner();
    if (new URLSearchParams(window.location.search).get('manual')) {
        document.getElementById('manual-id').focus();
    }
});
window.addEventListener('beforeunload', () => {
    if (html5Qrcode && scannerRunning) { try { html5Qrcode.stop(); } catch (e) {} }
});
</script>
{% endblock %}
