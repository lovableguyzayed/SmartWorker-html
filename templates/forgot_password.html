{% extends "base.html" %}

{% block title %}Forgot Password - SmartWorker{% endblock %}

{% block head %}
<style>
.signin-shell {
    background: linear-gradient(180deg, #eef3fb 0%, #f8fafc 45%, #f8fafc 100%);
}
</style>
{% endblock %}

{% block content %}
<div class="signin-shell max-w-sm mx-auto min-h-screen">
    <section class="bg-gradient-to-br from-primary to-accent text-white p-8 h-[220px] flex flex-col justify-center items-center relative overflow-hidden rounded-b-[2.2rem]">
        <div class="relative z-10 text-center">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-2xl mx-auto mb-4">
                <i class="fa-solid fa-key text-primary text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold">Reset Your Password</h1>
            <p class="text-sm opacity-90 mt-1">We'll email you a reset link</p>
        </div>
    </section>

    <main class="p-6 -mt-10 relative z-10">
        <div class="bg-white rounded-3xl shadow-2xl p-6 mb-6 border border-gray-100">
            <form method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="space-y-2">
                    <label for="email" class="text-sm font-semibold text-gray-700 block">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-envelope text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" required placeholder="Enter your account email"
                               class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent text-gray-800 transition-all">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-primary to-accent text-white py-3 rounded-xl font-bold text-base shadow-xl hover:shadow-2xl transition-all">
                    Send Reset Link
                </button>
            </form>
        </div>

        <div class="text-center mb-8">
            <p class="text-gray-600 text-sm">
                Remembered your password?
                <a href="{{ url_for('login') }}" class="text-accent font-bold hover:text-blue-700 transition-colors">Sign In</a>
            </p>
        </div>
    </main>
</div>
{% endblock %}
